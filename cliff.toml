# cliff.toml — git-cliff configuration for agent-token-usage-tui
#
# Purpose
# -------
# The curated, human-authored `CHANGELOG.md` stays canonical; it carries
# the "why" for each release in a way a mechanical tool can't. This
# config exists so any contributor can regenerate a machine-rendered
# CHANGELOG from the commit log for:
#   * reviewing what landed since the last tag
#   * drafting release notes to seed the curated file
#   * feeding cnb's `git:release` description
#
# Typical usage
# -------------
#   git cliff --unreleased                 # preview unreleased commits
#   git cliff -o CHANGELOG.auto.md         # side-by-side artifact
#   git cliff --latest -o release-notes.md # single-release blurb (for CI)
#   git cliff --bump --tag v0.3.0 -o CHANGELOG.auto.md  # preview next tag
#
# Repo commit convention (see AGENTS.md, MEMORY[user_global])
# -----------------------------------------------------------
#   <emoji> <type>(<scope>): <中文主题>
#
#   - <改动点 1>
#   - <改动点 2>
#
#   Why:
#   - <背景 / 动机>
#
#   Footer:
#   - <关联 issue 或重大变更说明>
#
# docs: https://git-cliff.org/docs/configuration

[changelog]
# Header rendered once at the top of the output.
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html),
and the machine-rendered version below is generated by [git-cliff] from
the commit history. The hand-curated release notes live in `CHANGELOG.md`.

[git-cliff]: https://git-cliff.org/

"""

# Release body template (Tera). Rendered once per version block.
#
# Layout:
#   ## [X.Y.Z] — YYYY-MM-DD
#
#   ### ✨ Added
#
#   - **(scope)** subject (`abc1234`)
#   ...
#
# Rules:
#   * Use `<REPO>` as a URL stand-in; the `postprocessors` below rewrites
#     it to the actual cnb.cool path. Keeps forks / repo renames to a
#     one-line diff.
#   * Commit subject goes through `| split(pat="\n") | first | trim` so
#     the body (Why / Footer paragraphs) never leaks into the list item.
#   * `{%- -%}` strips adjacent whitespace; the commit bullet is kept on
#     a single logical line so `trim = true` can tidy the output.
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") -%}
### {{ group }}

{% for commit in commits -%}
- {% if commit.breaking %}[**breaking**] {% endif %}{% if commit.scope %}**({{ commit.scope }})** {% endif %}{{ commit.message | split(pat="\n") | first | trim }} ([`{{ commit.id | truncate(length=7, end="") }}`](<REPO>/-/commit/{{ commit.id }}))
{% endfor %}

{% endfor %}
"""

# Footer rendered once at the bottom. Intentionally empty: the curated
# CHANGELOG.md owns footnote-style reference links, and mixing the two
# would fight over the trailing section.
footer = ""

# Strip leading / trailing whitespace from every rendered block.
trim = true

# Final string rewrites applied after templating. One entry, one purpose:
# keep the repo URL in a single place so future forks change one line.
postprocessors = [
    { pattern = '<REPO>', replace = "https://cnb.cool/prevailna/agent-token-usage-tui" },
]

# Re-render the changelog on every invocation even when there are no
# commits since the last tag. Without this, `git cliff --latest` on a
# tag-only bump produces an empty file and the CI release-notes step
# silently ships a blank Release description.
render_always = true

[git]
# Parse commits per the Conventional Commits spec.
conventional_commits = true
# Keep unconventional commits too; the catch-all parser at the bottom
# of `commit_parsers` routes them to "🌀 Other" instead of dropping them
# on the floor. That means a human-authored CHANGELOG.md line is never
# quietly lost if someone forgets the `feat:` prefix.
filter_unconventional = false
# Don't hard-error on unconventional commits — we routinely land fixup
# / revert / WIP commits on feature branches.
require_conventional = false
# One commit == one line. Multi-bullet bodies stay attached to the
# subject rather than getting exploded into N fake commits.
split_commits = false

# Regex-based preprocessing applied to the commit message BEFORE the
# Conventional Commits parser runs. The single rule below strips the
# leading emoji + whitespace so parsing sees a clean `feat(scope): …`.
#
# Pattern rationale: TOML literal strings (single-quoted) avoid double
# escaping. `^[^a-zA-Z]+` matches any run of non-ASCII-letter characters
# at the start — catches ✨ / 🐛 / 👷 / 🔧 / emoji + space / BOM — and
# the replace is empty. Intentionally conservative: we *only* touch the
# very first characters, never the body, so "Why:" / "Footer:" blocks
# downstream are preserved verbatim for anyone reading the raw commit.
commit_preprocessors = [
    { pattern = '^[^a-zA-Z]+', replace = "" },
]

# Commit → group mapping. Order matters: the first matching rule wins.
# Breaking changes are hoisted above every conventional-type rule so a
# `feat!:` or a body containing `BREAKING CHANGE` always lands in the
# dedicated 💥 section regardless of its type prefix.
commit_parsers = [
    { message = '^.+!:', group = "💥 Breaking Changes" },
    # Catches a BREAKING CHANGE: / BREAKING-CHANGE: declaration at the
    # start of any body/footer line (per Conventional Commits 1.0.0).
    # `(?m)` anchors `^` to every newline, otherwise a prose mention
    # like "handle the BREAKING CHANGE scenario" inside an explanation
    # would false-positive into the 💥 bucket.
    { body = '(?m)^BREAKING[ -]CHANGE:', group = "💥 Breaking Changes" },

    # Conventional Commits types → Keep a Changelog-flavoured sections.
    # Names stay English so the rendered CHANGELOG matches the upstream
    # spec (https://keepachangelog.com/en/1.1.0/); emojis mirror the
    # commit subject prefix so release notes keep a visual rhythm.
    { message = '^feat', group = "✨ Added" },
    { message = '^fix', group = "🐛 Fixed" },
    { message = '^perf', group = "⚡ Performance" },
    { message = '^refactor', group = "♻ Refactored" },
    { message = '^docs', group = "📝 Documentation" },
    { message = '^test', group = "✅ Tests" },
    { message = '^style', group = "🎨 Styles" },
    { message = '^build', group = "📦 Build" },
    { message = '^ci', group = "👷 CI/CD" },

    # Release / dependency chores clutter human-facing notes; hide them.
    # Everything else under `chore` (tooling, housekeeping) still shows
    # up under the 🔧 bucket.
    { message = '^chore\(release\)', skip = true },
    { message = '^chore\(deps\)', skip = true },
    { message = '^chore', group = "🔧 Chore" },

    { message = '^revert', group = "⏪ Reverts" },

    # Escape hatch: let contributors opt out of the changelog per-commit.
    # Added to the *commit footer*, e.g. `Footer:\nchangelog: ignore`.
    { footer = '^changelog: ?ignore', skip = true },

    # Catch-all. Keeps unconventional commits visible rather than silent.
    { message = '.*', group = "🌀 Other" },
]

# `feat!:` style breaking markers already hoist to 💥; this flag extends
# that to any commit whose body explicitly declares BREAKING CHANGE
# without the `!:` shorthand.
protect_breaking_commits = false

# Don't silently drop commits that failed to parse; route them via the
# catch-all parser instead.
filter_commits = false
fail_on_unmatched_commit = false

# tag_pattern is a regex (docs §git/tag_pattern). We tag strictly as
# `vX.Y.Z` optionally followed by a pre-release / build suffix
# (`-rc.1`, `+sha`, etc.). A bare `v1` or `v1.0` won't match and won't
# fragment a Release block.
tag_pattern = 'v[0-9]+\.[0-9]+\.[0-9]+.*'
skip_tags = ""
ignore_tags = ""

# Newest-first sort within each group. Reasoning: release notes read
# top-down; the most recent commit is usually the one a user cares
# about most when triaging "what broke".
sort_commits = "newest"
topo_order = false
topo_order_commits = true

# Extract `#<number>` issue references into clickable links. Uses the
# `<REPO>` placeholder so the postprocessor rewrites them at render time.
link_parsers = [
    { pattern = '#(\d+)', href = "<REPO>/-/issues/$1" },
]

[bump]
# When `git cliff --bump` computes the next tag:
#   * any `feat` commit forces at least a minor bump
#   * any breaking change forces a major bump
# This matches SemVer + Conventional Commits 1.0.0 verbatim.
features_always_bump_minor = true
breaking_always_bump_major = true
# Seed version when no tag exists yet. We already passed this milestone
# (v0.1.0 landed), but the key is required by the spec and keeps the
# `--bump` logic deterministic for brand-new forks.
initial_tag = "0.1.0"
