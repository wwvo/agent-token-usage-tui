# Tag-triggered release pipeline for agent-token-usage-tui.
#
# Produces per-platform `.tar.gz` / `.zip` archives + SHA-256 checksums
# and attaches them to a GitHub Release matching the pushed tag. The
# primary distribution channel is cnb.cool (`.cnb.yml` produces Linux
# tarballs there); this workflow is the GitHub-mirror equivalent, covering
# the three OSes cnb.cool can't provision natively.
#
# Trigger: any tag that looks like a semver release (`vX.Y.Z`, optionally
# with `-<pre>` / `+<build>` suffixes). Push to a non-v* tag won't match.
#
# Matrix targets:
#   - x86_64-unknown-linux-gnu    (ubuntu-latest, native)
#   - aarch64-unknown-linux-gnu   (ubuntu-latest, via `cross`)
#   - x86_64-pc-windows-msvc      (windows-latest, native)
#   - aarch64-pc-windows-msvc     (windows-latest, via MSVC amd64_arm64 toolchain)
#   - aarch64-apple-darwin        (macos-14, Apple Silicon)
#
# `x86_64-apple-darwin` was dropped — macos-13 runners have long queues
# and Intel Macs are no longer the mainstream user base.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

# Gatekeep concurrent release runs for the *same* tag. Two pushes of the
# same tag (e.g. force-retag) queue up instead of racing to upload.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # needed to publish the GitHub Release + assets

env:
  CARGO_TERM_COLOR: always
  AGENT_TUI_DISABLE_LITELLM_DOWNLOAD: "1"
  # Opt into Node.js 24 for actions/checkout + actions/upload-artifact
  # to silence the Node 20 deprecation warnings on recent GHA runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            bin: agent-token-usage-tui
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            bin: agent-token-usage-tui
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            bin: agent-token-usage-tui.exe
            msvc_dev_cmd_arch: amd64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
            bin: agent-token-usage-tui.exe
            msvc_dev_cmd_arch: amd64_arm64
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            bin: agent-token-usage-tui

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Target-scoped cache key so different matrix legs don't invalidate
      # each other: the Linux leg's `target/release/` layout differs
      # enough from Windows that shared caches thrash.
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # `cross` enables aarch64-linux-gnu cross-compilation from an
      # x86_64 runner without wrestling with apt sysroot indexes. The
      # glibc target needs a matching C runtime and works cleanest
      # through cross's Docker image.
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # MSVC dev cmd plants the right `cl.exe` / `link.exe` on PATH.
      # `amd64` is native on windows-latest; `amd64_arm64` selects VS's
      # x86_64-host → ARM64-target cross toolchain, which pairs with
      # the `aarch64-pc-windows-msvc` rustup target the step above
      # already installed.
      - name: Setup MSVC developer command prompt
        if: endsWith(matrix.target, '-pc-windows-msvc')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_dev_cmd_arch }}

      - name: Build release binary (cross)
        if: matrix.use_cross
        shell: bash
        run: cross build --profile dist --locked --target ${{ matrix.target }}

      # Windows MSVC targets use pwsh, not bash. Under `shell: bash`
      # the MSYS2 `/usr/bin` precedes MSVC's bin dir on PATH, so rustc
      # invokes `C:\Program Files\Git\usr\bin\link.exe` — that's GNU
      # coreutils' POSIX hard-link helper, not the MSVC linker — and
      # build-scripts fail with:
      #     /usr/bin/link: extra operand '...build_script_build-*.o'
      # pwsh inherits the runner's native PATH order so `link.exe`
      # resolves to VS's Hostx64\x64\link.exe as intended. Matches the
      # wwvo/cnb-rs build.yml split.
      - name: Build release binary (cargo, Windows MSVC)
        if: ${{ !matrix.use_cross && endsWith(matrix.target, '-pc-windows-msvc') }}
        shell: pwsh
        run: cargo build --profile dist --locked --target ${{ matrix.target }}

      - name: Build release binary (cargo)
        if: ${{ !matrix.use_cross && !endsWith(matrix.target, '-pc-windows-msvc') }}
        shell: bash
        run: cargo build --profile dist --locked --target ${{ matrix.target }}

      # Cargo emits the artifact into
      # `target/<target>/dist/<bin>`. The `dist` profile already sets
      # `strip = true`; we don't re-strip here because cross-compiled
      # binutils aren't always available on every runner OS.
      - name: Stage archive contents
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#refs/tags/}"
          stage="atut-${tag}-${{ matrix.target }}"
          mkdir -p "${stage}"
          cp "target/${{ matrix.target }}/dist/${{ matrix.bin }}" "${stage}/"
          cp README.md CHANGELOG.md LICENSE "${stage}/"
          echo "stage=${stage}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Pack archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          stage="${{ steps.stage.outputs.stage }}"
          tar czf "${stage}.tar.gz" "${stage}"
          shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          ls -la "${stage}.tar.gz"*

      - name: Pack archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "${{ steps.stage.outputs.stage }}"
          Compress-Archive -Path "$stage" -DestinationPath "$stage.zip"
          $hash = Get-FileHash -Path "$stage.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  $stage.zip" | Out-File -Encoding ascii -FilePath "$stage.zip.sha256"
          Get-ChildItem "$stage.zip*"

      - name: Upload archive as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.stage }}
          path: |
            ${{ steps.stage.outputs.stage }}.${{ matrix.archive }}
            ${{ steps.stage.outputs.stage }}.${{ matrix.archive }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show assets
        shell: bash
        run: ls -la dist/

      # Install git-cliff to render the release body from the commit log.
      # A prebuilt binary keeps this under 5 s; compiling from source
      # would roughly double the release job's wall time.
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      # Compose the release body in two passes:
      #   1. `git cliff --latest` renders the current tag's version
      #      block per cliff.toml (short bullets, grouped by type).
      #   2. Append a `### Contributors` section with `@login` mentions
      #      from the tag-to-tag compare range. GitHub auto-renders any
      #      `@username` in a Release body into the avatar contributor
      #      list at the page bottom — the same hook codex
      #      (openai/codex) relies on for its Release pages.
      - name: Generate release notes
        id: release_notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes="${RUNNER_TEMP}/release-notes.md"

          git cliff --latest -o "${notes}"

          # Strip the file-level "# Changelog" header + description
          # paragraph and the "## [X.Y.Z] — YYYY-MM-DD" version heading
          # from the rendered notes. Both are redundant on the Release
          # page: the page title IS the tag name, and CHANGELOG.md in
          # the repo owns the file-level header/links. We only want
          # the per-group sections (### ✨ Added, ### 🐛 Fixed, ...)
          # plus the git-cliff footer comment.
          #
          # Changing `[changelog].header` in cliff.toml would also
          # affect the committed CHANGELOG.md, so the trim happens
          # here in the CI post-process instead.
          awk 'started || /^### /; /^### / { started = 1 }' \
            "${notes}" > "${notes}.stripped"
          mv "${notes}.stripped" "${notes}"

          # Previous tag in version-sort order. `awk` skips over the
          # current tag so the calculation works even if multiple
          # release workflows happened to interleave locally.
          prev_tag="$(git tag -l --sort=-version:refname \
            | awk -v tag="${TAG}" '$0 != tag { print; exit }')"
          range="${prev_tag:+${prev_tag}...}${TAG}"

          # Per-commit contributor rendering:
          #   * If the commit author's email is linked to a GitHub user,
          #     render `- @login` so the Release page auto-resolves it
          #     into an avatar chip (same mechanism codex relies on).
          #   * Otherwise fall back to `- commit.author.name` — works
          #     for cnb.cool-mirrored pushes whose `@noreply.cnb.cool`
          #     emails don't map to any GitHub user (`author.login` is
          #     null), preserving at least the human-readable handle
          #     instead of silently dropping the whole section.
          contributors="$(gh api --paginate \
            "/repos/${GITHUB_REPOSITORY}/compare/${range}" \
            --jq '.commits[] | if .author.login then "- @" + .author.login else "- " + .commit.author.name end' \
            2>/dev/null | awk 'NF' | sort -u || true)"

          if [ -n "${contributors}" ]; then
            {
              echo ""
              echo "### Contributors"
              echo ""
              echo "${contributors}"
            } >> "${notes}"
          fi

          echo "::group::Release body preview"
          cat "${notes}"
          echo "::endgroup::"

          echo "path=${notes}" >> "${GITHUB_OUTPUT}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*
