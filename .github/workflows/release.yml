# Tag-triggered release pipeline for agent-token-usage-tui.
#
# Produces per-platform `.tar.gz` / `.zip` archives + SHA-256 checksums
# and attaches them to a GitHub Release matching the pushed tag. The
# primary distribution channel is cnb.cool (`.cnb.yml` produces Linux
# tarballs there); this workflow is the GitHub-mirror equivalent, covering
# the three OSes cnb.cool can't provision natively.
#
# Trigger: any tag that looks like a semver release (`vX.Y.Z`, optionally
# with `-<pre>` / `+<build>` suffixes). Push to a non-v* tag won't match.
#
# Matrix targets:
#   - x86_64-unknown-linux-gnu    (ubuntu-latest, native)
#   - aarch64-unknown-linux-gnu   (ubuntu-latest, via `cross`)
#   - x86_64-pc-windows-msvc      (windows-latest, native)
#   - aarch64-pc-windows-msvc     (windows-latest, via MSVC amd64_arm64 toolchain)
#   - aarch64-apple-darwin        (macos-14, Apple Silicon)
#
# `x86_64-apple-darwin` was dropped — macos-13 runners have long queues
# and Intel Macs are no longer the mainstream user base.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

# Gatekeep concurrent release runs for the *same* tag. Two pushes of the
# same tag (e.g. force-retag) queue up instead of racing to upload.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # needed to publish the GitHub Release + assets

env:
  CARGO_TERM_COLOR: always
  AGENT_TUI_DISABLE_LITELLM_DOWNLOAD: "1"
  # Opt into Node.js 24 for actions/checkout + actions/upload-artifact
  # to silence the Node 20 deprecation warnings on recent GHA runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            bin: agent-token-usage-tui
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            bin: agent-token-usage-tui
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            bin: agent-token-usage-tui.exe
            msvc_dev_cmd_arch: amd64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
            bin: agent-token-usage-tui.exe
            msvc_dev_cmd_arch: amd64_arm64
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            bin: agent-token-usage-tui

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Target-scoped cache key so different matrix legs don't invalidate
      # each other: the Linux leg's `target/release/` layout differs
      # enough from Windows that shared caches thrash.
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # `cross` enables aarch64-linux-gnu cross-compilation from an
      # x86_64 runner without wrestling with apt sysroot indexes. The
      # glibc target needs a matching C runtime and works cleanest
      # through cross's Docker image.
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # MSVC dev cmd plants the right `cl.exe` / `link.exe` on PATH.
      # `amd64` is native on windows-latest; `amd64_arm64` selects VS's
      # x86_64-host → ARM64-target cross toolchain, which pairs with
      # the `aarch64-pc-windows-msvc` rustup target the step above
      # already installed.
      - name: Setup MSVC developer command prompt
        if: endsWith(matrix.target, '-pc-windows-msvc')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_dev_cmd_arch }}

      - name: Build release binary (cross)
        if: matrix.use_cross
        shell: bash
        run: cross build --profile dist --locked --target ${{ matrix.target }}

      - name: Build release binary (cargo)
        if: ${{ !matrix.use_cross }}
        shell: bash
        run: cargo build --profile dist --locked --target ${{ matrix.target }}

      # Cargo emits the artifact into
      # `target/<target>/dist/<bin>`. The `dist` profile already sets
      # `strip = true`; we don't re-strip here because cross-compiled
      # binutils aren't always available on every runner OS.
      - name: Stage archive contents
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#refs/tags/}"
          stage="atut-${tag}-${{ matrix.target }}"
          mkdir -p "${stage}"
          cp "target/${{ matrix.target }}/dist/${{ matrix.bin }}" "${stage}/"
          cp README.md CHANGELOG.md LICENSE "${stage}/"
          echo "stage=${stage}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Pack archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          stage="${{ steps.stage.outputs.stage }}"
          tar czf "${stage}.tar.gz" "${stage}"
          shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          ls -la "${stage}.tar.gz"*

      - name: Pack archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "${{ steps.stage.outputs.stage }}"
          Compress-Archive -Path "$stage" -DestinationPath "$stage.zip"
          $hash = Get-FileHash -Path "$stage.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  $stage.zip" | Out-File -Encoding ascii -FilePath "$stage.zip.sha256"
          Get-ChildItem "$stage.zip*"

      - name: Upload archive as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.stage }}
          path: |
            ${{ steps.stage.outputs.stage }}.${{ matrix.archive }}
            ${{ steps.stage.outputs.stage }}.${{ matrix.archive }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show assets
        shell: bash
        run: ls -la dist/

      # `softprops/action-gh-release` creates the release if missing and
      # attaches every file we downloaded. We let it auto-extract a name
      # from the tag; a manually-curated changelog body lives in
      # `CHANGELOG.md`, which the user can copy-paste onto the release
      # page post-hoc if they want narrative notes.
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*
