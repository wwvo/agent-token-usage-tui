# .cnb.yml — cnb.cool CI pipelines
#
# Reference: https://docs.cnb.cool/zh/build/grammar.html
#
# Triggers
# --------
# - `main.push`        → fmt-check + clippy + test on amd64,
#                        plus test-only on arm64 (catches arch-specific bugs
#                        without doubling the lint cost).
# - `$.pull_request`   → fmt-check + clippy + test on amd64 for any branch
#                        opening a PR. `$` is cnb's catch-all branch match,
#                        so PR branches don't also match the `main` key.
# - `$.tag_push`       → build release artifacts for `vX.Y.Z` tags on both
#                        amd64 and arm64 Linux, leaving `atut-<tag>-<arch>-
#                        linux.tar.gz` + a `*.sha256` checksum in the
#                        workspace for cnb to surface as downloadable
#                        pipeline artifacts.
#
# Environment
# -----------
# - `AGENT_TUI_DISABLE_LITELLM_DOWNLOAD=1` disables `build.rs`'s network
#   fetch of the litellm pricing catalog. CI runners tend to hit GitHub
#   raw's rate limit; the repo ships a baked-in fallback that is already
#   fresh enough for tests.
# - `CARGO_TERM_COLOR=always` keeps clippy / test output colored in the
#   cnb log panel (web UI preserves ANSI escapes).
#
# Images & runners
# ----------------
# - `rust:1.85-slim` matches the crate's `rust-version = "1.85"` MSRV.
#   We pin the minor on purpose: bumping implicitly via `:slim` would
#   silently raise the MSRV floor.
# - `libssl-dev` / `pkg-config` are needed by reqwest's default TLS
#   backend; `git` is needed for `--locked` parity with local dev.
# - `ca-certificates` keeps `cargo fetch` from failing TLS on slim images.
# - `--locked` on every cargo command so CI can't silently bump
#   `Cargo.lock` — repro parity with the committed lockfile is the whole
#   reason we commit it.

main:
  push:
    - name: lint-and-test-amd64
      runner:
        tags: cnb:arch:amd64
      docker:
        image: rust:1.85-slim
      env:
        AGENT_TUI_DISABLE_LITELLM_DOWNLOAD: "1"
        CARGO_TERM_COLOR: "always"
      stages:
        - name: apt-deps
          script: |
            apt-get update
            apt-get install -y --no-install-recommends \
              libssl-dev pkg-config git ca-certificates
        - name: fmt-check
          script: cargo fmt --check
        - name: clippy
          script: cargo clippy --all-targets --locked -- -D warnings
        - name: test
          script: cargo test --locked

    - name: test-arm64
      runner:
        tags: cnb:arch:arm64:v8
      docker:
        image: rust:1.85-slim
      env:
        AGENT_TUI_DISABLE_LITELLM_DOWNLOAD: "1"
      stages:
        - name: apt-deps
          script: |
            apt-get update
            apt-get install -y --no-install-recommends \
              libssl-dev pkg-config git ca-certificates
        - name: test
          script: cargo test --locked

    # Lightweight smoke for the companion VSCode extension under
    # `tools/windsurf-exporter/`. Catches TypeScript regressions (broken
    # imports, dropped API methods, changed vscode d.ts surface) without
    # waiting for tag_push → vsix packaging.
    #
    # Uses `node:20-slim` rather than reusing `rust:1.85-slim` + apt-get
    # install nodejs: saves ~200MB of apt traffic per run and keeps this
    # pipeline's failure mode narrowly "exporter TypeScript broke",
    # distinct from the Rust lint-and-test pipeline above.
    - name: exporter-typecheck
      runner:
        tags: cnb:arch:amd64
      docker:
        image: node:20-slim
      stages:
        - name: npm-ci-and-compile
          # `npm ci` installs strictly against package-lock.json
          # (reproducible, unlike `npm install` which may mutate the
          # lock). `--loglevel=error` silences the standard deprecation
          # / funding noise while still surfacing real failures.
          script: |
            set -eu
            cd tools/windsurf-exporter
            npm ci --loglevel=error
            npm run compile

# Catch-all branch (`$`) — PR events. Lives separately from `main.push`
# so a merge to `main` doesn't run amd64 fmt+clippy+test twice. The same
# catch-all also hosts `tag_push`, since tags live on a detached ref that
# isn't `main` itself.
$:
  pull_request:
    - name: lint-and-test-pr
      runner:
        tags: cnb:arch:amd64
      docker:
        image: rust:1.85-slim
      env:
        AGENT_TUI_DISABLE_LITELLM_DOWNLOAD: "1"
        CARGO_TERM_COLOR: "always"
      stages:
        - name: apt-deps
          script: |
            apt-get update
            apt-get install -y --no-install-recommends \
              libssl-dev pkg-config git ca-certificates
        - name: fmt-check
          script: cargo fmt --check
        - name: clippy
          script: cargo clippy --all-targets --locked -- -D warnings
        - name: test
          script: cargo test --locked

    # Mirror the main.push-side exporter smoke on PRs so a broken
    # extension commit gets caught before it's merged — the whole point
    # of lifting it from tag_push to push/PR is shifting the failure
    # left in the contribution flow.
    - name: exporter-typecheck-pr
      runner:
        tags: cnb:arch:amd64
      docker:
        image: node:20-slim
      stages:
        - name: npm-ci-and-compile
          script: |
            set -eu
            cd tools/windsurf-exporter
            npm ci --loglevel=error
            npm run compile

  # Release pipelines — one per Linux architecture. Each produces a
  # stripped binary inside a versioned tarball plus a side-by-side
  # sha256 checksum, attaches them to the tag's cnb Release object, and
  # leaves copies in the workspace root (so cnb's UI also exposes them
  # as plain pipeline artifacts).
  #
  # Naming:
  #   atut-<tag>-<arch>-linux.tar.gz     ← binary + LICENSE + README + CHANGELOG
  #   atut-<tag>-<arch>-linux.tar.gz.sha256
  #
  # Release lifecycle:
  #   amd64 leg is the Release owner. It runs `git:release` once to
  #   create (or update) the Release, then emits a `cnb:resolve` so the
  #   arm64 leg, which is waiting on `cnb:await`, can attach its own
  #   tarball. Without this handshake the arm64 upload could race the
  #   Release-creation and fail with "tag has no release".
  #
  # Tag resolution: `$CNB_BRANCH` in a `tag_push` build equals the tag
  # name (e.g. `v0.1.1`). We still shell out to `git describe --tags
  # --always --dirty` as a belt-and-braces fallback for local testing
  # via `cnb run` where the env var may be absent.
  tag_push:
    - name: release-linux-amd64
      runner:
        tags: cnb:arch:amd64
      docker:
        image: rust:1.85-slim
      env:
        AGENT_TUI_DISABLE_LITELLM_DOWNLOAD: "1"
        CARGO_TERM_COLOR: "always"
        TARGET_ARCH: "amd64"
      stages:
        - name: apt-deps
          script: |
            apt-get update
            apt-get install -y --no-install-recommends \
              libssl-dev pkg-config git ca-certificates
        - name: build-dist
          # `--profile dist` maps to the optimized profile defined in
          # Cargo.toml (LTO + panic=abort + strip symbols), yielding a
          # single-binary release suitable for tarball distribution.
          script: cargo build --profile dist --locked
        - name: package
          # One large script so intermediate variables (TAG, STAGE) don't
          # need to survive across stages — simpler than exporting envs.
          # `set -eu` only; `-o pipefail` is a bash-ism and the cnb runner
          # uses dash by default (`sh: 1: set: Illegal option -o pipefail`).
          # None of the commands below are piped, so `-eu` is sufficient.
          script: |
            set -eu
            TAG="${CNB_BRANCH:-$(git describe --tags --always --dirty)}"
            STAGE="atut-${TAG}-${TARGET_ARCH}-linux"
            mkdir -p "${STAGE}"
            cp target/dist/agent-token-usage-tui "${STAGE}/"
            # `strip` is idempotent after dist profile's `strip = true`, but
            # the Rust linker on slim images sometimes leaves symbols in
            # the dwarf section. A belt-and-braces pass keeps binary size
            # predictable (~4-6 MB).
            strip "${STAGE}/agent-token-usage-tui" || true
            cp README.md CHANGELOG.md LICENSE "${STAGE}/"
            tar czf "${STAGE}.tar.gz" "${STAGE}"
            sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
            ls -la "${STAGE}.tar.gz"*
        - name: extract-release-notes
          # Carve out the CHANGELOG stanza for this exact version so the
          # Release description mirrors what users read in source. awk:
          # start printing after `## [X.Y.Z]`, stop at the next `## [`.
          # If no match (e.g. an unreleased tag), fall back to a one-
          # liner so `git:release` still has *some* body.
          #
          # Contributors: cnb runners don't have `gh` or GitHub API
          # access, and cnb.cool itself doesn't auto-render `@mentions`
          # into avatars the way github.com does. We fall back to the
          # raw author display name (`%an`) from `git log`, listing
          # every unique contributor in the tag-to-tag range.
          script: |
            set -eu
            TAG="${CNB_BRANCH:-$(git describe --tags --always --dirty)}"
            VERSION="${TAG#v}"
            awk "/^## \\[${VERSION}\\]/{flag=1; next} /^## \\[/{flag=0} flag" \
              CHANGELOG.md > release-notes.md
            if [ ! -s release-notes.md ]; then
              echo "See [CHANGELOG.md](./CHANGELOG.md) for release notes." > release-notes.md
            fi

            prev_tag="$(git tag -l --sort=-version:refname \
              | awk -v tag="${TAG}" '$0 != tag { print; exit }' || true)"
            if [ -n "${prev_tag}" ]; then
              range="${prev_tag}..${TAG}"
            else
              range="${TAG}"
            fi

            authors="$(git log --format='%an' "${range}" 2>/dev/null \
              | awk 'NF' | sort -u || true)"
            if [ -n "${authors}" ]; then
              {
                echo ""
                echo "### Contributors"
                echo ""
                echo "${authors}" | sed 's/^/- /'
              } >> release-notes.md
            fi

            echo "--- release-notes.md preview ---"
            head -n 40 release-notes.md
        - name: create-release
          type: git:release
          options:
            # tag_push event: cnb auto-fills tag from $CNB_BRANCH.
            # overlying=true: update the Release in place instead of
            # deleting + recreating on each tag re-push; that would
            # also nuke any attachments the arm64 leg had uploaded.
            overlying: true
            title: "${CNB_BRANCH}"
            descriptionFromFile: release-notes.md
            latest: true
        - name: signal-release-ready
          # Unblocks the arm64 leg's `cnb:await`. Must come *after*
          # `create-release`; resolving before the Release exists would
          # let arm64 race ahead and see a 404.
          type: cnb:resolve
          options:
            key: atut-release-ready
        - name: upload-amd64-assets
          image: cnbcool/attachments:latest
          settings:
            # Globbed so a future arch or rename doesn't need a yaml
            # touch-up — only the amd64 tarball + checksum matches here.
            attachments:
              - "./atut-*-amd64-linux.tar.gz"
              - "./atut-*-amd64-linux.tar.gz.sha256"

    - name: release-linux-arm64
      runner:
        tags: cnb:arch:arm64:v8
      docker:
        image: rust:1.85-slim
      env:
        AGENT_TUI_DISABLE_LITELLM_DOWNLOAD: "1"
        CARGO_TERM_COLOR: "always"
        TARGET_ARCH: "arm64"
      stages:
        - name: apt-deps
          script: |
            apt-get update
            apt-get install -y --no-install-recommends \
              libssl-dev pkg-config git ca-certificates
        - name: build-dist
          script: cargo build --profile dist --locked
        - name: package
          # Same `set -eu` rationale as the amd64 leg above.
          script: |
            set -eu
            TAG="${CNB_BRANCH:-$(git describe --tags --always --dirty)}"
            STAGE="atut-${TAG}-${TARGET_ARCH}-linux"
            mkdir -p "${STAGE}"
            cp target/dist/agent-token-usage-tui "${STAGE}/"
            strip "${STAGE}/agent-token-usage-tui" || true
            cp README.md CHANGELOG.md LICENSE "${STAGE}/"
            tar czf "${STAGE}.tar.gz" "${STAGE}"
            sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
            ls -la "${STAGE}.tar.gz"*
        - name: wait-release-ready
          # Block until the amd64 leg has created the Release. Pairs
          # with its `cnb:resolve` of the same key. Without this, an
          # attachments upload for a tag with no Release yet errors out.
          type: cnb:await
          options:
            key: atut-release-ready
        - name: upload-arm64-assets
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - "./atut-*-arm64-linux.tar.gz"
              - "./atut-*-arm64-linux.tar.gz.sha256"

    # Package the companion VSCode extension as a third release artifact.
    # The vsix is arch-independent (pure JavaScript), so one pipeline
    # suffices. Runs in a Node image on amd64 in parallel with the two
    # Rust legs; gates on the same `atut-release-ready` key as arm64 so
    # it waits for amd64 to create the Release before attaching.
    #
    # Output `agent-token-usage-tui-windsurf-exporter-X.Y.Z.vsix` is
    # moved to the workspace root where `cnbcool/attachments` expects it
    # (matches the amd64/arm64 legs' `./atut-*` glob convention).
    - name: release-vsix
      runner:
        tags: cnb:arch:amd64
      docker:
        image: node:20-slim
      stages:
        - name: package
          script: |
            set -eu
            cd tools/windsurf-exporter
            npm ci --loglevel=error
            npm run package
            # vsce drops the vsix into the package dir; relocate to
            # repo root so the attachments glob below can find it.
            mv *.vsix ../../
            ls -la ../../*.vsix
        - name: wait-release-ready
          type: cnb:await
          options:
            key: atut-release-ready
        - name: upload-vsix
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - "./agent-token-usage-tui-windsurf-exporter-*.vsix"
